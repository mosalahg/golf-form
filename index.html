<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Tournament Registration</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        /* Header */
        .form-header {
            background: linear-gradient(135deg, #056038 0%, #078a52 100%);
            text-align: center;
            padding: 36px 24px 30px;
            color: #fff;
        }
        .form-header h1 {
            margin: 0 0 10px;
            font-size: 26px;
            font-weight: 700;
            line-height: 1.3;
        }
        .form-header p {
            margin: 0;
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.5;
        }
        .header-divider {
            width: 60px;
            height: 3px;
            background: rgba(255,255,255,0.5);
            margin: 14px auto 16px;
            border-radius: 2px;
        }

        /* Page wrapper */
        .page-wrapper {
            max-width: 650px;
            margin: 0 auto;
            background: #fff;
        }
    </style>
</head>
<body>

    <!-- Header (only lives here on the website, not in D365) -->
    <div class="form-header">
        <h1>10th Annual President's Scholarship<br>Golf Tournament</h1>
        <div class="header-divider"></div>
        <p>100% of proceeds fund scholarships for Deaf and hard of hearing students.</p>
        <p style="margin-top:6px; font-weight:600;">June 22, 2026</p>
    </div>

    <div class="page-wrapper">

        <!-- D365 Form Embed (loads the form fields from D365) -->
        <div
            data-form-id='59a9d805-df14-f111-8342-70a8a50f30e1'
            data-form-api-url='https://public-can.mkt.dynamics.com/api/v1.0/orgs/58c25681-1c41-4696-b5f7-a548aeb7e111/landingpageforms'
            data-cached-form-url='https://assets-can.mkt.dynamics.com/58c25681-1c41-4696-b5f7-a548aeb7e111/digitalassets/forms/59a9d805-df14-f111-8342-70a8a50f30e1'>
        </div>
        <script src='https://cxppusa1formui01cdnsa01-endpoint.azureedge.net/can/FormLoader/FormLoader.bundle.js'></script>

    </div>

    <!-- All JavaScript lives here on the website page, NOT in D365 -->
    <script>
    function waitForForm() {
        var sponsorEl  = document.querySelector('[name="optionset9110"]');
        var foursomeEl = document.querySelector('[name="twooptions4993"]');
        var passportEl = document.querySelector('[name="optionset4098"]');
        var paymentEl  = document.querySelector('[name="new_paymentoption"]');

        // Keep waiting until D365 finishes loading all fields
        if (!sponsorEl || !foursomeEl || !passportEl || !paymentEl) {
            setTimeout(waitForForm, 300);
            return;
        }

        // Attach change listeners
        sponsorEl.addEventListener('change', calculate);
        foursomeEl.addEventListener('change', calculate);
        passportEl.addEventListener('change', calculate);
        paymentEl.addEventListener('change', handlePayment);

        // Run both on load to show correct defaults
        calculate();
        handlePayment();
    }

    function handlePayment() {
        var paymentEl = document.querySelector('[name="new_paymentoption"]');
        var btn       = document.getElementById('mainSubmitButton');
        var hint      = document.getElementById('paymentHint');

        if (!paymentEl || !btn) return;

        var val = paymentEl.value;

        if (val === '2') {
            btn.style.display = 'block';
            btn.innerText = 'Pay Securely with Credit Card';
            if (hint) hint.style.display = 'none';
        } else if (val === '1') {
            btn.style.display = 'block';
            btn.innerText = 'Submit Invoice Request';
            if (hint) hint.style.display = 'none';
        } else {
            btn.style.display = 'none';
            if (hint) hint.style.display = 'block';
        }
    }

    function calculate() {
        var sponsorEl  = document.querySelector('[name="optionset9110"]');
        var foursomeEl = document.querySelector('[name="twooptions4993"]');
        var passportEl = document.querySelector('[name="optionset4098"]');

        if (!sponsorEl || !foursomeEl || !passportEl) return;

        var sponsorshipValues = { "1":25000,"2":20000,"3":15000,"4":10000,"5":5000,"6":3500,"7":1500,"8":550 };
        var passportMapping   = { "1":4,"2":8,"3":12,"4":0 };

        var sPrice = sponsorshipValues[sponsorEl.value] || 0;
        var fPrice = foursomeEl.checked ? 2000 : 0;
        var pCount = passportMapping[passportEl.value] || 0;
        var pPrice = pCount * 100;
        var total  = sPrice + fPrice + pPrice;

        document.getElementById('dispSponsor').innerText  = "$" + sPrice.toLocaleString();
        document.getElementById('dispFoursome').innerText = "$" + fPrice.toLocaleString();
        document.getElementById('dispPassport').innerText = "$" + pPrice.toLocaleString();
        document.getElementById('dispTotal').innerText    = "$" + total.toLocaleString();

        var hiddenTotal    = document.querySelector('[name="shorttext3661"]');
        var hiddenPassport = document.querySelector('[name="shorttext9854"]');
        if (hiddenTotal)    hiddenTotal.value    = total;
        if (hiddenPassport) hiddenPassport.value = pCount;
    }

    waitForForm();
    </script>

</body>
</html>
